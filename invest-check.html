<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Logic Machine v3</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #0b0b0d;
    color: #e5e7eb;
    margin: 0;
    padding: 40px;
}

.container {
    max-width: 900px;
    margin: auto;
}

.header {
    text-align: center;
    margin-bottom: 30px;
}

.card {
    background: #111114;
    border: 1px solid #1f1f23;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

input {
    width: 100%;
    padding: 14px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 1px solid #2a2a2f;
    background: #000;
    color: #c5ef4a;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 16px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, #c5ef4a, #a3e635);
    color: #000;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.02);
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-top: 20px;
}

.metric {
    background: #0d0d10;
    padding: 16px;
    border-radius: 10px;
    border: 1px solid #1f1f23;
}

.metric h4 {
    margin: 0;
    font-size: 12px;
    color: #9ca3af;
}

.metric p {
    margin: 6px 0 0;
    font-size: 18px;
    font-weight: 600;
}

.verdict {
    margin-top: 25px;
    padding: 20px;
    text-align: center;
    font-size: 20px;
    border-radius: 10px;
    font-weight: 600;
}

.green { background: #052e16; color: #4ade80; }
.red { background: #2e0b0b; color: #f87171; }
.yellow { background: #2e2a05; color: #facc15; }

.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #6b7280;
    text-align: center;
}
</style>
</head>

<body>
<div class="container">

<div class="header">
    <h1>Investment Logic Machine</h1>
    <p>Financial Viability Scanner</p>
</div>

<div class="card">
    <input type="password" id="key" placeholder="API Key">
    <input type="text" id="symbol" placeholder="Ticker (AAPL)">
    <button onclick="run()">Analyze Investment</button>

    <div id="results" style="display:none;">
        <div class="grid" id="metrics"></div>
        <div id="verdictBox" class="verdict"></div>
        <div class="footer" id="price"></div>
    </div>
</div>

</div>

<script>
async function run() {
    const key = document.getElementById('key').value;
    const ticker = document.getElementById('symbol').value.toUpperCase();

    if (!ticker) return alert("Enter a ticker");

    const resBox = document.getElementById('results');
    const metricsBox = document.getElementById('metrics');
    const verdictBox = document.getElementById('verdictBox');
    const priceBox = document.getElementById('price');

    resBox.style.display = "block";
    metricsBox.innerHTML = "Loading...";

    try {
        const [incomeRes, balanceRes, cashRes, ratioRes, priceRes] = await Promise.all([
            fetch(`https://financialmodelingprep.com/api/v3/income-statement/${ticker}?limit=2&apikey=${key}`),
            fetch(`https://financialmodelingprep.com/api/v3/balance-sheet-statement/${ticker}?limit=1&apikey=${key}`),
            fetch(`https://financialmodelingprep.com/api/v3/cash-flow-statement/${ticker}?limit=1&apikey=${key}`),
            fetch(`https://financialmodelingprep.com/api/v3/ratios/${ticker}?limit=1&apikey=${key}`),
            fetch(`https://financialmodelingprep.com/api/v3/quote/${ticker}?apikey=${key}`)
        ]);

        const incomeData = await incomeRes.json();
        const balanceData = await balanceRes.json();
        const cashData = await cashRes.json();
        const ratioData = await ratioRes.json();
        const priceData = await priceRes.json();

        const income = incomeData[0];
        const prev = incomeData[1];
        const balance = balanceData[0];
        const cash = cashData[0];
        const ratios = ratioData[0];
        const price = priceData[0].price;

        const margin = income.netIncome / income.revenue;
        const roe = income.netIncome / balance.totalStockholdersEquity;
        const growth = prev ? (income.revenue - prev.revenue) / prev.revenue : 0;
        const debt = balance.totalLiabilities / balance.totalStockholdersEquity;
        const fcfMargin = cash.freeCashFlow / income.revenue;
        const pe = ratios.priceEarningsRatio;

        let score = 0;
        if (margin > 0.2) score += 20; else if (margin > 0.1) score += 15;
        if (roe > 0.2) score += 15; else if (roe > 0.15) score += 10;
        if (growth > 0.1) score += 15; else if (growth > 0.05) score += 10;
        if (debt < 1) score += 10; else score -= 5;
        if (fcfMargin > 0.1) score += 15; else if (fcfMargin > 0.05) score += 10;
        if (pe > 0 && pe < 20) score += 15; else if (pe < 35) score += 8; else score -= 5;

        let verdict = "AVOID";
        let color = "red";

        if (score >= 70) { verdict = "STRONG BUY"; color = "green"; }
        else if (score >= 55) { verdict = "BUY"; color = "green"; }
        else if (score >= 40) { verdict = "HOLD"; color = "yellow"; }

        metricsBox.innerHTML = `
            <div class="metric"><h4>Margin</h4><p>${(margin*100).toFixed(1)}%</p></div>
            <div class="metric"><h4>ROE</h4><p>${(roe*100).toFixed(1)}%</p></div>
            <div class="metric"><h4>Growth</h4><p>${(growth*100).toFixed(1)}%</p></div>
            <div class="metric"><h4>Debt/Equity</h4><p>${debt.toFixed(2)}</p></div>
            <div class="metric"><h4>FCF Margin</h4><p>${(fcfMargin*100).toFixed(1)}%</p></div>
            <div class="metric"><h4>P/E</h4><p>${pe.toFixed(1)}</p></div>
        `;

        verdictBox.className = `verdict ${color}`;
        verdictBox.innerHTML = `${verdict} — Score: ${score}/100`;

        priceBox.innerHTML = `Current Price: $${price}`;

    } catch (err) {
        metricsBox.innerHTML = "Error loading data";
    }
}
</script>

</body>
</html>
