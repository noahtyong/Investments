<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Investment Logic Machine v2.5 (v4 Engine)</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0b0b0d; color: #e1e1e1; padding: 40px; }
        .card { background: #141417; border: 1px solid #26262b; padding: 24px; border-radius: 8px; max-width: 700px; margin: auto; }
        input { background: #000; border: 1px solid #26262b; color: #c5ef4a; padding: 12px; margin: 10px 0; width: 100%; box-sizing: border-box; }
        button { background: #c5ef4a; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; }
        #log { background: #000; border: 1px solid #333; padding: 15px; margin-top: 20px; font-size: 12px; white-space: pre-wrap; color: #888; min-height: 200px; }
        .green { color: #c5ef4a; } .red { color: #f87171; }
    </style>
</head>
<body>

<div class="card">
    <h2>// LOGIC MACHINE v2.5</h2>
    <input type="password" id="key" placeholder="v4 API Key">
    <input type="text" id="symbol" placeholder="Ticker (AAPL)">
    <button onclick="run()">EXECUTE v4 ANALYSIS</button>
    <div id="log">System Ready.</div>
</div>

<script>
async function run() {
    const log = document.getElementById('log');
    const key = document.getElementById('key').value;
    const ticker = document.getElementById('symbol').value.toUpperCase();
    
    log.innerHTML = `> Initializing v4 fetch for ${ticker}...\n`;

    try {
        // v4 Company Outlook provides Name, Price, and Market Cap in one hit
        const outlookRes = await fetch(`https://financialmodelingprep.com/api/v4/company-outlook?symbol=${ticker}&apikey=${key}`);
        const outlook = await outlookRes.json();

        if (outlook["Error Message"] || !outlook.profile) {
            log.innerHTML += `<span class="red">> REJECTION: ${outlook["Error Message"] || "v4 Access Denied"}</span>\n`;
            return;
        }

        // v4 Financial Reports (most stable for new accounts)
        const incomeRes = await fetch(`https://financialmodelingprep.com/api/v3/income-statement/${ticker}?limit=1&apikey=${key}`);
        const income = await incomeRes.json();
        
        const balanceRes = await fetch(`https://financialmodelingprep.com/api/v3/balance-sheet-statement/${ticker}?limit=1&apikey=${key}`);
        const balance = await balanceRes.json();

        const p = outlook.profile;
        const i = income[0];
        const b = balance[0];

        // Manual Calculation Logic
        const A = (b.totalCurrentAssets - b.totalCurrentLiabilities) / b.totalAssets;
        const B = b.retainedEarnings / b.totalAssets;
        const C = i.ebit / b.totalAssets;
        const D = p.mktCap / b.totalLiabilities;
        const E = i.revenue / b.totalAssets;
        const zScore = (1.2 * A + 1.4 * B + 3.3 * C + 0.6 * D + 1.0 * E).toFixed(2);

        log.innerHTML += `<span class="green">> v4 ANALYSIS COMPLETE: ${p.companyName}</span>\n`;
        log.innerHTML += `--------------------------------\n`;
        log.innerHTML += `ALTMAN Z-SCORE: ${zScore}\n`;
        log.innerHTML += `MARKET CAP:     $${(p.mktCap / 1e9).toFixed(2)}B\n`;
        log.innerHTML += `NET MARGIN:     ${((i.netIncome / i.revenue) * 100).toFixed(2)}%\n`;
        log.innerHTML += `--------------------------------\n`;
        log.innerHTML += `VERDICT: ${zScore > 3 ? 'STRUCTURALLY SOUND' : 'FINANCIAL DISTRESS RISK'}`;

    } catch (e) {
        log.innerHTML += `<span class="red">> FATAL SYSTEM ERROR: ${e.message}</span>\n`;
    }
}
</script>
</body>
</html>
