<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Logic Machine v4</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; background:#0b0b0d; color:#e5e7eb; margin:0; padding:40px; }
.container { max-width:900px; margin:auto; }
.header { text-align:center; margin-bottom:30px; }
.card { background:#111114; border:1px solid #1f1f23; border-radius:12px; padding:24px; }
input { width:100%; padding:14px; margin-bottom:12px; border-radius:8px; border:1px solid #2a2a2f; background:#000; color:#c5ef4a; }
button { width:100%; padding:16px; border-radius:10px; border:none; background:#c5ef4a; color:#000; font-weight:600; cursor:pointer; }
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:15px; margin-top:20px; }
.metric { background:#0d0d10; padding:16px; border-radius:10px; border:1px solid #1f1f23; }
.metric h4 { margin:0; font-size:12px; color:#9ca3af; }
.metric p { margin:6px 0 0; font-size:18px; font-weight:600; }
.verdict { margin-top:25px; padding:20px; text-align:center; font-size:20px; border-radius:10px; font-weight:600; }
.green { background:#052e16; color:#4ade80; }
.red { background:#2e0b0b; color:#f87171; }
.yellow { background:#2e2a05; color:#facc15; }
.footer { margin-top:20px; font-size:12px; color:#6b7280; text-align:center; }
</style>
</head>

<body>
<div class="container">

<div class="header">
<h1>Investment Logic Machine v4</h1>
<p>Real Financial Viability Engine</p>
</div>

<div class="card">
<input type="text" id="symbol" placeholder="Ticker (AAPL)">
<button onclick="run()">Analyze</button>

<div id="results" style="display:none;">
<div class="grid" id="metrics"></div>
<div id="verdictBox" class="verdict"></div>
<div class="footer" id="price"></div>
</div>
</div>

</div>

<script>
const res = await fetch(`/api/data?ticker=${ticker}`);
const data = await res.json();

// ===== METRICS =====
const safe = (n,d)=> d? n/d:0;

const margin = safe(netIncome, revenue);
const roe = safe(netIncome, equity);
const debtToEquity = safe(debt, equity);
const fcfMargin = safe(fcf, revenue);

// ===== SCORING =====
let score = 0;

if (margin > 0.2) score += 20; else if (margin > 0.1) score += 15;
if (roe > 0.2) score += 15; else if (roe > 0.15) score += 10;
if (debtToEquity < 1) score += 10; else score -= 5;
if (fcfMargin > 0.1) score += 15; else if (fcfMargin > 0.05) score += 10;
if (pe > 0 && pe < 20) score += 15; else if (pe < 35) score += 8; else score -= 5;

let verdict = "AVOID";
let color = "red";

if (score >= 65) { verdict = "STRONG BUY"; color = "green"; }
else if (score >= 50) { verdict = "BUY"; color = "green"; }
else if (score >= 35) { verdict = "HOLD"; color = "yellow"; }

metricsBox.innerHTML = `
<div class="metric"><h4>Margin</h4><p>${(margin*100).toFixed(1)}%</p></div>
<div class="metric"><h4>ROE</h4><p>${(roe*100).toFixed(1)}%</p></div>
<div class="metric"><h4>Debt/Equity</h4><p>${debtToEquity.toFixed(2)}</p></div>
<div class="metric"><h4>FCF Margin</h4><p>${(fcfMargin*100).toFixed(1)}%</p></div>
<div class="metric"><h4>P/E</h4><p>${pe.toFixed(1)}</p></div>
<div class="metric"><h4>Revenue</h4><p>$${(revenue/1e9).toFixed(1)}B</p></div>
`;

verdictBox.className = `verdict ${color}`;
verdictBox.innerHTML = `${verdict} — Score ${score}/100`;

priceBox.innerHTML = `Price: $${price}`;

} catch (err) {
metricsBox.innerHTML = `<span style='color:red;'>API failed (Yahoo blocked or invalid ticker)</span>`;
}
}
</script>

</body>
</html>
