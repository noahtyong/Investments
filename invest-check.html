<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Investment Logic Machine v2.6 (v4 Reports)</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0b0b0d; color: #e1e1e1; padding: 40px; }
        .card { background: #141417; border: 1px solid #26262b; padding: 24px; border-radius: 8px; max-width: 700px; margin: auto; }
        input { background: #000; border: 1px solid #26262b; color: #c5ef4a; padding: 12px; margin: 10px 0; width: 100%; box-sizing: border-box; }
        button { background: #c5ef4a; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; }
        #log { background: #000; border: 1px solid #333; padding: 15px; margin-top: 20px; font-size: 12px; white-space: pre-wrap; color: #888; min-height: 200px; }
        .green { color: #c5ef4a; } .red { color: #f87171; }
    </style>
</head>
<body>

<div class="card">
    <h2>// LOGIC MACHINE v2.6</h2>
    <input type="password" id="key" placeholder="v4 API Key">
    <input type="text" id="symbol" placeholder="Ticker (AAPL)">
    <button onclick="run()">EXECUTE v4 REPORT ANALYSIS</button>
    <div id="log">System Ready.</div>
</div>

<script>
async function run() {
    const log = document.getElementById('log');
    const key = document.getElementById('key').value;
    const ticker = document.getElementById('symbol').value.toUpperCase();
    
    log.innerHTML = `> Initializing v4 Report Fetch for ${ticker}...\n`;

    try {
        // v4 Financial Reports JSON - This is the modern endpoint for new accounts
        // We fetch the most recent full report (10-K or 10-Q)
        const reportRes = await fetch(`https://financialmodelingprep.com/api/v4/financial-reports-json?symbol=${ticker}&year=2024&period=FY&apikey=${key}`);
        const data = await reportRes.json();

        if (data["Error Message"] || !data.incomeStatement) {
            log.innerHTML += `<span class="red">> REJECTION: ${data["Error Message"] || "v4 Data Not Found"}</span>\n`;
            log.innerHTML += `> Note: Free tier might require Year=2023 or 2024 specifically.\n`;
            return;
        }

        // v4 structure maps data into arrays of objects with 'label' and 'value'
        const getVal = (arr, label) => {
            const item = arr.find(d => d.label === label);
            return item ? parseFloat(item.value) : 0;
        };

        const revenue = getVal(data.incomeStatement, "Revenue");
        const netIncome = getVal(data.incomeStatement, "Net income");
        const assets = getVal(data.balanceSheet, "Total assets");
        const liabilities = getVal(data.balanceSheet, "Total liabilities");
        const equity = getVal(data.balanceSheet, "Total shareholders' equity");
        const ebit = getVal(data.incomeStatement, "Operating income or loss");

        log.innerHTML += `<span class="green">> v4 DATA PARSED SUCCESSFULLY</span>\n`;
        log.innerHTML += `--------------------------------\n`;
        log.innerHTML += `REVENUE:    $${(revenue / 1e9).toFixed(2)}B\n`;
        log.innerHTML += `NET INCOME: $${(netIncome / 1e9).toFixed(2)}B\n`;
        log.innerHTML += `EQUITY:     $${(equity / 1e9).toFixed(2)}B\n`;
        log.innerHTML += `--------------------------------\n`;
        
        // Simple Logic Score
        const margin = (netIncome / revenue) * 100;
        const roe = (netIncome / equity) * 100;

        log.innerHTML += `NET MARGIN: ${margin.toFixed(2)}%\n`;
        log.innerHTML += `ROE:        ${roe.toFixed(2)}%\n`;
        log.innerHTML += `--------------------------------\n`;
        log.innerHTML += `VERDICT: ${margin > 10 ? 'STRONGLY PROFITABLE' : 'MARGIN PRESSURE'}`;

    } catch (e) {
        log.innerHTML += `<span class="red">> FATAL SYSTEM ERROR: ${e.message}</span>\n`;
    }
}
</script>
</body>
</html>
